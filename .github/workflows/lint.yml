name: Lint

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/lint.yml"

jobs:
  frontend-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build
