name: Backend Tests

on:
  push:
    paths:
      - "backend/aspnet-core/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/aspnet-core/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/aspnet-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore unit test project
        run: dotnet restore test/conversa-studio.Tests/conversa-studio.Tests.csproj

      - name: Build unit test project
        run: dotnet build test/conversa-studio.Tests/conversa-studio.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test test/conversa-studio.Tests/conversa-studio.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Detect web test readiness
        id: web_tests
        shell: bash
        run: |
          if [ -f "src/conversa-studio.Web.Mvc/conversa-studio.Web.Mvc.csproj" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore web test project
        if: steps.web_tests.outputs.enabled == 'true'
        run: dotnet restore test/conversa-studio.Web.Tests/conversa-studio.Web.Tests.csproj

      - name: Build web test project
        if: steps.web_tests.outputs.enabled == 'true'
        run: dotnet build test/conversa-studio.Web.Tests/conversa-studio.Web.Tests.csproj --configuration Release --no-restore

      - name: Run web tests
        if: steps.web_tests.outputs.enabled == 'true'
        run: dotnet test test/conversa-studio.Web.Tests/conversa-studio.Web.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Explain skipped web tests
        if: steps.web_tests.outputs.enabled != 'true'
        run: echo "Skipping conversa-studio.Web.Tests because src/conversa-studio.Web.Mvc is not present in this repository yet."
