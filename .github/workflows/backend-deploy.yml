name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/aspnet-core/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/aspnet-core/conversa-studio.sln

      - name: Test
        run: dotnet test backend/aspnet-core/conversa-studio.sln --configuration Release --no-restore

      - name: Publish backend
        run: dotnet publish backend/aspnet-core/src/conversa-studio.Web.Host/conversa-studio.Web.Host.csproj --configuration Release --no-restore --output publish/backend

      - name: Archive published app
        run: tar -C publish/backend -czf backend-release.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-${{ github.sha }}
          path: backend-release.tar.gz
          if-no-files-found: error

      - name: Copy release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "backend-release.tar.gz"
          target: "/tmp/"

      - name: Bootstrap and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -e

            APP_ROOT="/var/www/conversa-studio/backend"
            RELEASES_DIR="${APP_ROOT}/releases"
            RELEASE_DIR="${RELEASES_DIR}/${{ github.sha }}"
            CURRENT_LINK="${APP_ROOT}/current"
            ARCHIVE="/tmp/backend-release.tar.gz"
            RUNTIME_USER="${{ secrets.DEPLOY_USER }}"

            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y nginx
            fi

            if ! command -v dotnet >/dev/null 2>&1; then
              wget https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
              sudo dpkg -i packages-microsoft-prod.deb
              rm -f packages-microsoft-prod.deb
              sudo apt-get update
              sudo apt-get install -y aspnetcore-runtime-9.0
            fi

            sudo mkdir -p "${RELEASES_DIR}"
            sudo mkdir -p /etc/conversa-studio
            sudo chown -R "${RUNTIME_USER}:www-data" /var/www/conversa-studio
            sudo chmod -R 775 /var/www/conversa-studio

            sudo rm -rf "${RELEASE_DIR}"
            sudo mkdir -p "${RELEASE_DIR}"
            sudo tar -xzf "${ARCHIVE}" -C "${RELEASE_DIR}"
            sudo chown -R "${RUNTIME_USER}:www-data" "${RELEASE_DIR}"
            rm -f "${ARCHIVE}"

            sudo tee /etc/conversa-studio/backend.env > /dev/null <<EOF
            ConnectionStrings__Default=${{ secrets.DB_CONNECTION_STRING }}
            Authentication__JwtBearer__SecurityKey=${{ secrets.JWT_SECURITY_KEY }}
            Authentication__JwtBearer__Issuer=conversa-studio
            Authentication__JwtBearer__Audience=conversa-studio
            EOF

            sudo tee /etc/systemd/system/conversa-studio-backend.service > /dev/null <<EOF
            [Unit]
            Description=Conversa Studio Backend
            After=network.target

            [Service]
            WorkingDirectory=${CURRENT_LINK}
            ExecStart=/usr/bin/dotnet ${CURRENT_LINK}/conversa-studio.Web.Host.dll
            Restart=always
            RestartSec=5
            KillSignal=SIGINT
            SyslogIdentifier=conversa-studio-backend
            User=${RUNTIME_USER}
            Group=www-data
            Environment=ASPNETCORE_ENVIRONMENT=Production
            Environment=ASPNETCORE_URLS=http://127.0.0.1:5000
            Environment=App__ServerRootAddress=https://russell.servecounterstrike.com/
            Environment=App__CorsOrigins=https://russell.servecounterstrike.com,https://conversa-studio.vercel.app
            EnvironmentFile=-/etc/conversa-studio/backend.env

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/nginx/sites-available/conversa-studio-backend.conf > /dev/null <<'EOF'
            map $http_upgrade $connection_upgrade {
                default upgrade;
                "" close;
            }

            server {
                listen 80;
                listen [::]:80;
                server_name russell.servecounterstrike.com;

                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name russell.servecounterstrike.com;

                ssl_certificate /etc/letsencrypt/live/russell.servecounterstrike.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/russell.servecounterstrike.com/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                client_max_body_size 25m;

                location / {
                    proxy_pass http://127.0.0.1:5000;
                    proxy_http_version 1.1;

                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;

                    proxy_read_timeout 120s;
                    proxy_send_timeout 120s;
                    proxy_connect_timeout 30s;
                }
            }
            EOF

            sudo ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"
            sudo ln -sfn /etc/nginx/sites-available/conversa-studio-backend.conf /etc/nginx/sites-enabled/conversa-studio-backend.conf
            if [ -f /etc/nginx/sites-enabled/default ]; then
              sudo rm -f /etc/nginx/sites-enabled/default
            fi

            sudo systemctl daemon-reload
            sudo systemctl enable conversa-studio-backend.service
            sudo nginx -t
            sudo systemctl restart conversa-studio-backend.service
            sudo systemctl reload nginx
            sudo systemctl status --no-pager conversa-studio-backend.service
