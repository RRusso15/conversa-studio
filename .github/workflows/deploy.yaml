name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend deploy secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel secrets; skipping frontend deploy."
            exit 0
          fi

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm ci

      - name: Build frontend
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm run build

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  build-backend-image:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
      AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}

    outputs:
      image_name: ${{ steps.image.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend deploy secrets
        shell: bash
        run: |
          if [ -z "$AWS_EC2_HOST" ] || [ -z "$AWS_EC2_USER" ] || [ -z "$AWS_EC2_SSH_KEY" ]; then
            echo "Missing AWS host deploy secrets; skipping backend image build."
            exit 0
          fi

      - name: Compute image name
        if: env.AWS_EC2_HOST != '' && env.AWS_EC2_USER != '' && env.AWS_EC2_SSH_KEY != ''
        id: image
        shell: bash
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/conversa-studio-web-host:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: env.AWS_EC2_HOST != '' && env.AWS_EC2_USER != '' && env.AWS_EC2_SSH_KEY != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: env.AWS_EC2_HOST != '' && env.AWS_EC2_USER != '' && env.AWS_EC2_SSH_KEY != ''
        uses: docker/build-push-action@v5
        with:
          context: backend/aspnet-core
          file: backend/aspnet-core/src/conversa-studio.Web.Host/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image_name }}

  deploy-backend:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-backend-image

    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
      AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
      IMAGE_NAME: ${{ needs.build-backend-image.outputs.image_name }}

    steps:
      - name: Deploy backend to AWS host
        if: env.AWS_EC2_HOST != '' && env.AWS_EC2_USER != '' && env.AWS_EC2_SSH_KEY != '' && env.IMAGE_NAME != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if ! command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            sudo mkdir -p /opt/conversa-studio
            sudo chown $USER:$USER /opt/conversa-studio

            cat > /opt/conversa-studio/docker-compose.yml <<'COMPOSEEOF'
            services:
              conversa_studio_host:
                image: __IMAGE_NAME__
                env_file:
                  - .env
                environment:
                  ASPNETCORE_ENVIRONMENT: Production
                  Kestrel__Endpoints__Http__Url: http://+:80
                ports:
                  - "80:80"
                volumes:
                  - "./Host-Logs:/app/App_Data/Logs"
                restart: always
            COMPOSEEOF

            sed -i "s|__IMAGE_NAME__|$IMAGE_NAME|g" /opt/conversa-studio/docker-compose.yml

            {
              printf 'ASPNETCORE_ENVIRONMENT=Production\n'
              printf 'ConnectionStrings__Default=%s\n' '${{ secrets.ConnectionStrings__Default }}'
              printf 'App__ServerRootAddress=%s\n' '${{ secrets.App__ServerRootAddress }}'
              printf 'App__ClientRootAddress=%s\n' '${{ secrets.App__ClientRootAddress }}'
              printf 'App__CorsOrigins=%s\n' '${{ secrets.App__CorsOrigins }}'
              printf 'Authentication__JwtBearer__SecurityKey=%s\n' '${{ secrets.Authentication__JwtBearer__SecurityKey }}'
              printf 'Authentication__JwtBearer__Issuer=%s\n' '${{ secrets.Authentication__JwtBearer__Issuer }}'
              printf 'Authentication__JwtBearer__Audience=%s\n' '${{ secrets.Authentication__JwtBearer__Audience }}'
            } > /opt/conversa-studio/.env

            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker compose -f /opt/conversa-studio/docker-compose.yml --project-directory /opt/conversa-studio down || true
            sudo docker compose -f /opt/conversa-studio/docker-compose.yml --project-directory /opt/conversa-studio pull
            sudo docker compose -f /opt/conversa-studio/docker-compose.yml --project-directory /opt/conversa-studio up -d
            sudo docker image prune -f

      - name: Explain skipped backend deploy
        if: env.AWS_EC2_HOST == '' || env.AWS_EC2_USER == '' || env.AWS_EC2_SSH_KEY == '' || env.IMAGE_NAME == ''
        run: echo "Skipping backend deploy because AWS host deploy secrets are missing."

  deployment-note:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - build-backend-image
      - deploy-backend

    steps:
      - name: Deployment configuration note
        run: |
          echo "Frontend deploy requires VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."
          echo "Optional frontend env: NEXT_PUBLIC_API_BASE_URL, NEXT_PUBLIC_APP_URL."
          echo "Backend AWS host deploy requires AWS_EC2_HOST, AWS_EC2_USER, and AWS_EC2_SSH_KEY."
          echo "Backend runtime env requires ConnectionStrings__Default, App__ServerRootAddress, App__ClientRootAddress, App__CorsOrigins, Authentication__JwtBearer__SecurityKey, Authentication__JwtBearer__Issuer, and Authentication__JwtBearer__Audience."
