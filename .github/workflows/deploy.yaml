name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    if: (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  deploy-backend:
    if: (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && secrets.RENDER_DEPLOY_HOOK_URL != ''
    runs-on: ubuntu-latest

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      ASPNETCORE_ENVIRONMENT: ${{ secrets.ASPNETCORE_ENVIRONMENT }}
      ConnectionStrings__Default: ${{ secrets.ConnectionStrings__Default }}
      App__ServerRootAddress: ${{ secrets.App__ServerRootAddress }}
      App__ClientRootAddress: ${{ secrets.App__ClientRootAddress }}
      App__CorsOrigins: ${{ secrets.App__CorsOrigins }}
      Authentication__JwtBearer__SecurityKey: ${{ secrets.Authentication__JwtBearer__SecurityKey }}
      Authentication__JwtBearer__Issuer: ${{ secrets.Authentication__JwtBearer__Issuer }}
      Authentication__JwtBearer__Audience: ${{ secrets.Authentication__JwtBearer__Audience }}

    steps:
      - name: Trigger Render deploy hook
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  deployment-note:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - deploy-backend

    steps:
      - name: Deployment configuration note
        run: |
          echo "Frontend deploy requires VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."
          echo "Frontend app env can be supplied with NEXT_PUBLIC_API_BASE_URL and NEXT_PUBLIC_APP_URL."
          echo "Backend deploy requires RENDER_DEPLOY_HOOK_URL."
          echo "Backend runtime env can be supplied with ASPNETCORE_ENVIRONMENT, ConnectionStrings__Default, App__ServerRootAddress, App__ClientRootAddress, App__CorsOrigins, Authentication__JwtBearer__SecurityKey, Authentication__JwtBearer__Issuer, and Authentication__JwtBearer__Audience."
